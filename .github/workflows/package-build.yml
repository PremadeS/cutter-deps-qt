name: package build

on:
  push:
    branches:
    - master
    tags:
    - v*
    - deploy-test*
  pull_request:
    branches:
    - master

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        name: [
          linux-x86_64,
          macos-x86_64,
          macos-arm64,
          windows-x86_64
        ]
        include:
          - name: linux-x86_64
            os: ubuntu-20.04
            arch: x86_64
          - name: macos-x86_64
            os: macos-12
            arch: x86_64
          - name: macos-arm64
            os: macos-14
            arch: arm64
          - name: windows-x86_64
            os: windows-2019
            arch: x86_64
      fail-fast: false
    steps:
    - uses: actions/checkout@v4
    - name: build windows
      if: contains(matrix.os, 'windows')
      shell: powershell
      run: |
        ./build_windows.ps1
        echo "UPLOAD_FILE=cutter-deps-qt-win-${{ matrix.arch }}.tar.gz" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "UPLOAD_ASSET_TYPE=application/gzip" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
    - name: build macos
      if: contains(matrix.os, 'macos')
      run: |
        xcode-select --print-path
        make ARCH=${{ matrix.arch }} BUILD_THREADS=1
        echo UPLOAD_FILE=cutter-deps-qt-macos-${{ matrix.arch }}.tar.gz >> $GITHUB_ENV
        echo UPLOAD_ASSET_TYPE=application/gzip >> $GITHUB_ENV
    - name: build linux outputs
      if: contains(matrix.os, 'ubuntu')
      run: |
        sudo apt-get update
        sudo apt-get install \
          libxcb1-dev \
          libxkbcommon-dev \
          libxkbcommon-x11-dev \
          libgtk-3-dev \
          libgl1-mesa-dev \
          libglu1-mesa-dev \
          libxcb-*-dev \
          libclang-12-dev \
          llvm-12
        apt list --installed
        sudo apt remove llvm-10 clang-10
        make ARCH=${{ matrix.arch }}
        echo UPLOAD_FILE=cutter-deps-qt-linux-${{ matrix.arch }}.tar.gz >> $GITHUB_ENV
        echo UPLOAD_ASSET_TYPE=application/gzip >> $GITHUB_ENV

    - name: Create or Update Release
      uses: softprops/action-gh-release@v2
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      with:
        tag_name: v2
        name: Release v2
        body: "Automated build of Cutter dependencies by ${{ github.actor }}."
        draft: false
        prerelease: false
        files: ${{ env.UPLOAD_FILE }}
        append_body: true 
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set Git Identity
      run: |
        git config --global user.name "PremadeS"
        git config --global user.email "dummy-username@users.noreply.github.com"
